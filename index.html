<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGzlucas 欢迎页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 渐变背景 */
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            /* 居中布局 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "微软雅黑", sans-serif;
        }

        .welcome-box {
            text-align: center;
            color: #fff;
            padding: 40px 60px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        p {
            font-size: 20px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="welcome-box">
        <h1>欢迎来到 PGzlucas网页</h1>
        <p>很高兴在这里与你相遇✨</p>
    </div>
</body>
</html>
